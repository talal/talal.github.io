<!DOCTYPE html>
<html class="no-js" lang="en">
	<head>
		<meta charset="utf-8">
		<title>Muhammad Talal Anwar</title>
		<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍉</text></svg>">
		<meta name="description" content="Muhammad Talal Anwar">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="preconnect" href="https://rsms.me/">
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
		<style>
			:root {
				font-family: Inter, sans-serif;
				font-feature-settings: 'liga' 1, 'calt' 1; /* fix for Chrome */
			}
			@supports (font-variation-settings: normal) {
				:root { font-family: InterVariable, sans-serif; }
			}

			body {
				font-family: inherit;
				font-weight: 300;
				font-style: normal;
				margin: 0;
				padding-top: 10rem;
				padding-left: 4rem;
				color: #171717;
			}

			.links-container {
				display: flex;
				flex-direction: column;
				gap: 1.5rem;
				width: 100%;
				max-width: 800px;
			}

			h1 {
				margin: 0;
				font-size: 36px;
				font-weight: 400;
				letter-spacing: 0.25px;
			}

			a {
				color: #171717;
				text-decoration: none;
				text-underline-offset: 5px;
				border-bottom: #171717 4px solid;
				transition: border-color 0.15s;
			}

			a:hover {
				color: #0055ff;
				border-bottom: none;
				text-decoration: underline wavy #171717;
				text-underline-offset: 9px;
			}

			@media (prefers-color-scheme: dark) {
				body.adaptive {
					background-color: #171717;
					color: #cccccc;
				}

				a {
					color: #cccccc;
					border-bottom-color: #cccccc;
				}

				a:hover {
					color: #66b3ff;
					text-decoration-color: #cccccc;
				}
			}
		</style>
	</head>

	<body class="adaptive">
		<main class="links-container">
			<h1><a href="https://www.linkedin.com/in/mtnwr">LinkedIn</a></h1>
			<h1><a href="https://github.com/talal">GitHub</a></h1>
			<h1><a href="https://tangled.org/talal.ch">Tangled</a></h1>
			<h1><a href="https://bsky.app/profile/talal.ch">Bluesky</a></h1>
		</main>
	</body>
</html>
